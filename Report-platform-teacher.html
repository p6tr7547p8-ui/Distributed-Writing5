let SYNC_URL = "";
function setSyncUrl(u) {

  if (!r.ok) throw new Error("共有DBへの書き込みに失敗 (" + r.status + ")");
}
async function cloudGet(key) {
  const r = await fetch(cloudPath(key));
  if (!r.ok) throw new Error("共有DBの読み取りに失敗 (" + r.status + ")");
  return await r.json(); // 存在しない場合は null
}

// ---------- ストレージ層 (DB相当) ----------
const memStore = {};
async function dbSet(key, value) {
  const json = JSON.stringify(value);
  memStore[key] = json;
  // 共有DBが設定されていればそちらを主とする(学生・教員間でデータ共有)
  if (syncEnabled()) {
    try {
      await cloudSet(key, json);
      return {
        ok: true,
        persisted: true,
        cloud: true
      };
    } catch (e) {
      console.warn("共有DBへの保存に失敗(ローカルへ退避):", e);
    }
  }
  try {
    if (window.storage) {
      await window.storage.set(key, json, false);
      const back = await window.storage.get(key, false);
      if (!back || back.value == null) throw new Error("保存後の検証に失敗");
    }
  } catch (e) {
    console.warn("永続ストレージへの保存に失敗(メモリ上には保持):", e);
    return {
      ok: true,
      persisted: false,
      error: String(e && e.message || e)
    };
  }
  return {
    ok: true,
    persisted: true,
    cloud: false
  };
}
async function dbGet(key) {
  if (syncEnabled()) {
    try {
      const v = await cloudGet(key);
      if (v != null) return JSON.parse(v);
      return null; // 共有DB上に存在しない
    } catch (e) {
      console.warn("共有DBの読み取りに失敗(ローカルへフォールバック):", e);
    }
  }
  try {
    if (window.storage) {
      const r = await window.storage.get(key, false);
      if (r && r.value != null) return JSON.parse(r.value);
    }
  } catch (e) {/* key不存在など */}
  if (memStore[key] != null) return JSON.parse(memStore[key]);
  return null;
}

// ---------- 差分(diff)ユーティリティ ----------
function makeDiff(oldT, newT) {
  let p = 0;
  const maxP = Math.min(oldT.length, newT.length);
  while (p < maxP && oldT.charCodeAt(p) === newT.charCodeAt(p)) p++;
  let s = 0;
  const maxS = Math.min(oldT.length, newT.length) - p;
  while (s < maxS && oldT.charCodeAt(oldT.length - 1 - s) === newT.charCodeAt(newT.length - 1 - s)) s++;
  return {
    p,
    s,
    i: newT.slice(p, newT.length - s)
  };
}
function applyDiff(oldT, d) {
  return oldT.slice(0, d.p) + d.i + oldT.slice(oldT.length - d.s);
}

//  (A) ローカルブロックチェーン: SHA-256でハッシュ連結されたブロック列。
//      軽量Proof of Work(先頭2桁が"00")付き。改ざんは検証機能で検出可能。

// --- SHA-256 (Web Crypto API / 非対応環境向けフォールバック付き) ---
async function sha256Hex(str) {
  try {
    if (typeof crypto !== "undefined" && crypto.subtle) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
  } catch (e) {}
  // フォールバック(簡易ハッシュ。crypto.subtleが使えない環境用)
  let h1 = 0x811c9dc5,
    h2 = 0xcbf29ce4;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    h1 = (h1 ^ c) * 16777619 >>> 0;
    h2 = (h2 ^ (c << 7 | c >> 3)) * 16777619 >>> 0;
  }
  return (h1.toString(16).padStart(8, "0") + h2.toString(16).padStart(8, "0")).repeat(4).slice(0, 64);
}

// --- DID (分散型識別子) ---
// Web5のDIDs(Decentralized Identifiers)に倣い、ユーザー名から決定的にIDを生成
function didOf(name) {
  const s = name || "anonymous";
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (h * 33 >>> 0 ^ s.charCodeAt(i)) >>> 0;
  return "did:rpp:" + h.toString(16).padStart(8, "0");
}
const CHAIN_KEY = "rpp-chain";
async function loadChain() {
  return (await dbGet(CHAIN_KEY)) || [];
}
async function computeBlockHash(b) {
  return sha256Hex(b.index + "|" + b.prevHash + "|" + b.timestamp + "|" + JSON.stringify(b.data) + "|" + b.nonce);
}

// ブロックを追加(軽量PoW: ハッシュ先頭2桁が"00"になるnonceを探索)
async function addBlock(data) {
  const chain = await loadChain();
  if (chain.length === 0) {
    const genesis = {
      index: 0,
      timestamp: Date.now(),
      prevHash: "0".repeat(64),
      data: {
        type: "GENESIS",
        note: "レポート生成過程チェーン 創世ブロック"
      },
      nonce: 0,
      hash: ""
    };
    while (true) {
      genesis.hash = await computeBlockHash(genesis);
      if (genesis.hash.startsWith("00")) break;
      genesis.nonce++;
    }
    chain.push(genesis);
  }
  const prev = chain[chain.length - 1];
  const block = {
    index: chain.length,
    timestamp: Date.now(),
    prevHash: prev.hash,
    data,
    nonce: 0,
    hash: ""
  };
  while (true) {
    block.hash = await computeBlockHash(block);
    if (block.hash.startsWith("00")) break;
    block.nonce++;
  }
  chain.push(block);
  await dbSet(CHAIN_KEY, chain);
  return block;
}

// チェーン全体の整合性検証(ハッシュ再計算・連結・PoWの3点)
async function verifyChain() {
  const chain = await loadChain();
  const problems = [];
  for (let i = 0; i < chain.length; i++) {
    const b = chain[i];
    const h = await computeBlockHash(b);
    if (h !== b.hash) problems.push("ブロック#" + i + ": ハッシュ不一致(ブロックデータが改ざんされた可能性)");
    if (i > 0 && b.prevHash !== chain[i - 1].hash) problems.push("ブロック#" + i + ": 前ブロックとの連結が不整合");
    if (b.hash && !b.hash.startsWith("00")) problems.push("ブロック#" + i + ": Proof of Work条件未達");
  }
  return {
    ok: problems.length === 0,
    problems,
    length: chain.length
  };
}

// チェーンからNFTトークンの現在状態を導出(チェーン = 唯一の真実の記録)
async function chainTokens() {
  const chain = await loadChain();
  const tokens = {};
  chain.forEach(b => {
    const d = b.data || {};
    if (d.type === "MINT") {
      tokens[d.tokenId] = {
        tokenId: d.tokenId,
        subId: d.subId,
        title: d.title,
        creator: d.owner,
        creatorName: d.ownerName,
        owners: [d.owner],
        contentHash: d.contentHash,
        shared: false,
        blockIndex: b.index
      };
    }
    if (d.type === "SHARE" && tokens[d.tokenId]) tokens[d.tokenId].shared = !!d.shared;
    if (d.type === "ACQUIRE" && tokens[d.tokenId] && tokens[d.tokenId].owners.indexOf(d.owner) === -1) {
      tokens[d.tokenId].owners.push(d.owner);
    }
  });
  return tokens;
}

// --- 検索: Gemini検索(Google検索グラウンディング / 無料枠) ---
async function callGeminiSearch(query, settings) {
  if (!settings.geminiKey) throw new Error("NO_KEY");
  const models = Array.from(new Set([settings.geminiModel || "gemini-2.5-flash", "gemini-2.5-flash", "gemini-2.0-flash"]));
  let lastErr = null;
  for (const model of models) {
    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + encodeURIComponent(settings.geminiKey);
    let res;
    try {
      res = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: "「" + query + "」についてGoogle検索を実行し、検索結果の上位5件をJSON配列のみで返してください。" + '各要素は {"title": "ページタイトル", "link": "実際のページのURL", "snippet": "内容の要約(日本語で2〜3文)"} の形式。' + "linkは必ず http または https で始まる実在のURLにすること。JSON以外の文字、前置き、コードブロック記号は一切出力しないこと。"
            }]
          }],
          tools: [{
            google_search: {}
          }]
        })
      });
    } catch (e) {
      throw new Error("NETWORK_BLOCKED");
    }
    let data = {};
    try {
      data = await res.json();
    } catch (e) {}
    if (data.error) {
      lastErr = new Error("Gemini検索: " + (data.error.message || res.status));
      if (data.error.code === 404 || res.status === 404) continue;
      throw lastErr;
    }
    const cand = data.candidates && data.candidates[0];
    const parts = cand && cand.content && cand.content.parts;
    const text = (parts || []).map(p => p.text || "").join("");
    let items = [];
    const m = text.replace(/```json|```/g, "").match(/\[[\s\S]*\]/);
    if (m) {
      try {
        items = JSON.parse(m[0]);
      } catch (e) {}
    }
    const chunks = cand && cand.groundingMetadata && cand.groundingMetadata.groundingChunks || [];
    const sources = chunks.filter(c => c.web && c.web.uri).map(c => ({
      title: c.web.title || "",
      link: c.web.uri
    }));
    const results = [];
    const n = Math.max(items.length, sources.length);
    for (let i = 0; i < n && results.length < 6; i++) {
      const it = items[i] || {};
      const src = sources[i];
      const title = it.title || src && src.title || "";
      let link = src && src.link || (isValidUrl(it.link) ? it.link : "");
      if (!title && !link) continue;
      if (!link) link = googleSearchUrl(title);
      results.push({
        title: title || link,
        link,
        snippet: it.snippet || ""
      });
    }
    if (results.length > 0) return results;
    lastErr = new Error("Gemini検索: 結果の解析に失敗しました。もう一度お試しください。");
  }
  throw lastErr || new Error("Gemini検索: 呼び出しに失敗しました");
}

// --- 生成AI: Gemini API(無料枠) ---
async function callGemini(prompt, context, settings) {
  if (!settings.geminiKey) throw new Error("NO_KEY");
  const contentText = prompt; // 一般的なGemini利用と同じ挙動(前提文・本文コンテキストは付与しない)
  const models = Array.from(new Set([settings.geminiModel || "gemini-2.5-flash", "gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]));
  const versions = ["v1beta", "v1"];
  let lastErr = null;
  for (const model of models) {
    for (const ver of versions) {
      const url = "https://generativelanguage.googleapis.com/" + ver + "/models/" + model + ":generateContent?key=" + encodeURIComponent(settings.geminiKey);
      let res;
      try {
        res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: contentText
              }]
            }],
            generationConfig: {
              maxOutputTokens: 4096,
              temperature: 0.7
            }
          })
        });
      } catch (e) {
        throw new Error("NETWORK_BLOCKED");
      }
      let data = {};
      try {
        data = await res.json();
      } catch (e) {}
      if (data.error) {
        lastErr = new Error("Gemini API: " + (data.error.message || res.status));
        if (data.error.code === 404 || res.status === 404) continue;
        throw lastErr;
      }
      const parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
      const out = (parts || []).map(p => p.text || "").join("");
      if (out) return out;
      lastErr = new Error("Gemini API: 応答が空でした");
    }
  }
  throw lastErr || new Error("Gemini API: 呼び出しに失敗しました");
}
function fmtMs(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + "時間" + m % 60 + "分";
  if (m > 0) return m + "分" + s % 60 + "秒";
  return s + "秒";
}
function fmtClock(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return String(m).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
}
